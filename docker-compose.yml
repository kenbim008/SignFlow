# Local PostgreSQL for SignProz — matches .env DATABASE_URL default.
# Start Docker Desktop, then: npm run db:up
services:
  postgres:
    image: postgres:16-alpine
    container_name: signproz-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: signproz
    ports:
      - "5432:5432"
    volumes:
      - signproz_pgdata:/var/lib/postgresql/data

volumes:
  signproz_pgdata:
